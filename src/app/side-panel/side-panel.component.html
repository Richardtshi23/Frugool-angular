<!-- The dark overlay that fades in -->
<div class="side-panel-overlay" [class.open]="isOpen" (click)="close()"></div>

<!-- The premium side panel itself -->
<aside class="premium-side-panel" [class.open]="isOpen">

  <header class="panel-header">
    <!-- Brand Reinforcement -->
    <a routerLink="/" (click)="close()" class="panel-logo">
      <img src="../../assets/frugool logo tranparent.png" alt="Frugool Logo" />
    </a>
    <!-- Sleek new close button -->
    <button class="close-btn" (click)="close()">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
    </button>
  </header>

  <nav class="panel-nav">
    <!-- Main "Shop" links -->
    <a routerLink="/item/display/All" class="panel-link" (click)="close()">Shop All Gadgets</a>

    <hr class="divider">

    <!-- Psychological Hook: Use action-oriented, problem-solving language -->
    <p class="nav-heading">Upgrade Your Life</p>
    <a [routerLink]="['/item/category','PetTech']" class="panel-link" (click)="close()">Smart Pet Tech</a>
    <a [routerLink]="['/item/category','SmartHome']" class="panel-link" (click)="close()">Smart Home</a>
    <a [routerLink]="['/item/category','Wellness']" class="panel-link" (click)="close()">Wellness & Recovery</a>
    <!-- Call to Action: Bundles are a key profit driver, so we frame it as a deal -->
    <a [routerLink]="['/item/category','Bundles']" class="panel-link" (click)="close()">Value Bundles</a>

    <hr class="divider">

    <!-- Trust Building: Reassure the customer -->
    <p class="nav-heading">About Frugool</p>
    <a routerLink="/our-mission" class="panel-link" (click)="close()">Our Story</a>
    <a routerLink="/contact" class="panel-link" (click)="close()">Contact & Support</a>
    <a routerLink="/faq" class="panel-link" (click)="close()">FAQ</a>
  </nav>

</aside>
